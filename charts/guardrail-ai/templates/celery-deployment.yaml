apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "guardrail-ai.fullname" . }}-celery-worker
  labels:
    {{- include "guardrail-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: celery-worker
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "guardrail-ai.name" . }}-celery-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "guardrail-ai.name" . }}-celery-worker
        {{- include "guardrail-ai.labels" . | nindent 8 }}
    spec:
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command:
            - celery
            - -A
            - app.celery_app:celery_app
            - worker
            - --loglevel=info
            - --concurrency={{ .Values.celery.workerConcurrency }}
            - --max-tasks-per-child={{ .Values.celery.maxTasksPerChild }}
          env:
            - name: APP_ENV
              value: {{ .Values.config.appEnv }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "guardrail-ai.fullname" . }}-secrets
                  key: database-url
            - name: REDIS_URL
              value: {{ .Values.config.redisUrl }}
            - name: CELERY_BROKER_URL
              value: {{ .Values.config.celeryBrokerUrl }}
            - name: CELERY_RESULT_BACKEND
              value: {{ .Values.config.celeryResultBackend }}
          resources:
            {{- toYaml .Values.resources.celeryWorker | nindent 12 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "guardrail-ai.fullname" . }}-celery-beat
  labels:
    {{- include "guardrail-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: celery-beat
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "guardrail-ai.name" . }}-celery-beat
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "guardrail-ai.name" . }}-celery-beat
        {{- include "guardrail-ai.labels" . | nindent 8 }}
    spec:
      containers:
        - name: beat
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command:
            - celery
            - -A
            - app.celery_app:celery_app
            - beat
            - --loglevel=info
          env:
            - name: APP_ENV
              value: {{ .Values.config.appEnv }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "guardrail-ai.fullname" . }}-secrets
                  key: database-url
            - name: REDIS_URL
              value: {{ .Values.config.redisUrl }}
            - name: CELERY_BROKER_URL
              value: {{ .Values.config.celeryBrokerUrl }}
            - name: CELERY_RESULT_BACKEND
              value: {{ .Values.config.celeryResultBackend }}
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
