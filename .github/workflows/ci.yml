name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 isort mypy
      - name: Check formatting (black)
        run: black --check app/ tests/
      - name: Check imports (isort)
        run: isort --check-only app/ tests/
      - name: Lint (flake8)
        run: flake8 app/ tests/ --max-line-length=88 --extend-ignore=E203,W503
      - name: Type check (mypy)
        run: mypy app/

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci --omit=dev
      - name: Lint
        run: npm run lint || true
      - name: TypeScript check
        run: npx tsc --noEmit || true

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: guardrail_test
          POSTGRES_USER: guardrail
          POSTGRES_PASSWORD: guardrail
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov
      - name: Run Alembic migrations
        env:
          APP_ENV: test
          DATABASE_URL: postgresql://guardrail:guardrail@localhost:5432/guardrail_test
          SECRET_KEY: test-secret-key-for-ci-32-chars-minimum!!
          REDIS_URL: redis://localhost:6379/0
        run: alembic upgrade head
      - name: Run tests
        env:
          APP_ENV: test
          DATABASE_URL: postgresql://guardrail:guardrail@localhost:5432/guardrail_test
          SECRET_KEY: test-secret-key-for-ci-32-chars-minimum!!
          REDIS_URL: redis://localhost:6379/0
        run: pytest --cov=app --cov-report=term --cov-report=xml -v
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci --omit=dev
      - name: Run tests
        run: npm test || true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install bandit
        run: pip install bandit
      - name: SAST (bandit)
        run: bandit -r app/ -ll -f json -o bandit-report.json || true
      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f docker/app.Dockerfile -t guardrail-api:ci .
      - name: Build Frontend image
        run: docker build -f docker/frontend.Dockerfile -t guardrail-frontend:ci .
      - name: Scan images (trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: guardrail-api:ci
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL
